bind "KP_MULTIPLY" "disconnect"
bind "KP_MINUS" "quit"

//# Clears decals when the LMB is pressed.
bind "MOUSE1" "+attack; r_cleardecals"

//# Shows net_graph when Tab is pressed.
bind "TAB" "+sn"
alias "mygraph" "net_graph 1"
alias "+sn" "+showscores; mygraph"
alias "-sn" "-showscores; net_graph 0"
