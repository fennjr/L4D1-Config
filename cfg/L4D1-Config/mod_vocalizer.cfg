//# Requires ion's Vocalizer to take effect.
//# Download: https://www.gamemaps.com/details/17219

//# Applies ion's Vocalizer's default binds.
bind "F4" "+mouse_menu Characters"
bind "z" "+mouse_menu Orders"
bind "x" "+mouse_menu QA"
bind "c" "+mouse_menu Reactions"
bind "v" "+mouse_menu Enemies"
bind "b" "+mouse_menu Events"
bind "g" "+mouse_menu Misc"
bind "h" "+ch1; alias -ch1 -mouse_menu"
bind "n" "+ch2; alias -ch2 -mouse_menu"
bind "j" "+ch3; alias -ch3 -mouse_menu"
bind "m" "+ch4; alias -ch4 -mouse_menu"
bind "k" "+ch5; alias -ch5 -mouse_menu"