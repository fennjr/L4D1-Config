//# Desired spectator mode.
// cl_ideal_spec_mode "4" //# In-eye
cl_ideal_spec_mode "5" //# Chase
// cl_ideal_spec_mode "6" //# Roaming

//# Enables free roaming.
spec_allowroaming "1"

//# Enables sprays.
cl_playerspraydisable "0"

//# Enables console.
con_enable "1"

//# Disables all tips.
cl_autohelp "0"
cl_showhelp "0"
gameinstructor_enable "0"

//# Disables crosshair.
cl_crosshair_alpha "0"

//# Disables film grain.
mat_grain_scale_override "0"